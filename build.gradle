plugins {
    id 'java'
    id 'com.gradleup.shadow' version '8.3.6'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-core:2.12.5'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.12.5'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.12.5'
    implementation 'commons-io:commons-io:2.11.0'

    testImplementation 'org.junit.jupiter:junit-jupiter-engine:5.9.3'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.3.1'
}

// Include non-Java files (images, properties) from src/main/java on the classpath
sourceSets {
    main {
        resources {
            srcDirs 'src/main/java', 'src/main/resources'
            exclude '**/*.java'
        }
    }
}

processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes 'Main-Class': 'sudoku.Main'
    }
}

shadowJar {
    archiveBaseName = 'hodoku'
    archiveVersion = '3.1.0'
    archiveClassifier = ''
    manifest {
        attributes 'Main-Class': 'sudoku.Main'
    }
}

tasks.register('run', JavaExec) {
    dependsOn shadowJar
    classpath = files(shadowJar.archiveFile)
    mainClass = 'sudoku.Main'
    jvmArgs '--add-opens', 'java.desktop/com.apple.laf=ALL-UNNAMED'
}

tasks.register('jpackageWin', Exec) {
    dependsOn shadowJar
    group = 'distribution'
    description = 'Builds a native Windows app image using jpackage'

    def libsDir  = layout.buildDirectory.dir('libs').get().asFile.absolutePath
    def finalDest = layout.buildDirectory.dir('dist').get().asFile.absolutePath
    def javaHome = System.getenv('JAVA_HOME') ?: 'C:/Program Files/Eclipse Adoptium/jdk-17'
    def jpackage = "${javaHome}/bin/jpackage"

    commandLine 'cmd', '/c',
        "${jpackage} " +
        "--type app-image " +
        "--input \"${libsDir}\" " +
        "--main-jar hodoku-3.1.0.jar " +
        "--name HoDoKu " +
        "--dest \"${finalDest}\" " +
        "--java-options \"--add-opens java.desktop/sun.awt=ALL-UNNAMED\""
}

tasks.register('jpackageApp', Exec) {
    dependsOn shadowJar
    group = 'distribution'
    description = 'Builds a native macOS .app bundle using jpackage'

    def libsDir  = layout.buildDirectory.dir('libs').get().asFile.absolutePath
    def finalDest = layout.buildDirectory.dir('dist').get().asFile.absolutePath
    def javaHome = System.getenv('JAVA_HOME') ?: '/usr/local/Cellar/openjdk/25.0.2/libexec/openjdk.jdk/Contents/Home'
    def jpackage = "${javaHome}/bin/jpackage"

    // jpackage fails on external volumes due to macOS resource fork (._*) files,
    // so we build to /tmp first, then copy to the project build dir
    commandLine 'bash', '-c', """
        rm -rf /tmp/hodoku-dist
        ${jpackage} \\
            --type app-image \\
            --input ${libsDir} \\
            --main-jar hodoku-3.1.0.jar \\
            --name HoDoKu \\
            --dest /tmp/hodoku-dist \\
            '--java-options' '--add-opens java.desktop/com.apple.laf=ALL-UNNAMED'
        rm -rf ${finalDest}
        cp -r /tmp/hodoku-dist ${finalDest}
        echo "App bundle: ${finalDest}/HoDoKu.app"
    """.stripIndent()
}
