plugins {
    id 'java'
    id 'com.gradleup.shadow' version '8.3.6'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-core:2.12.5'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.12.5'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.12.5'
    implementation 'commons-io:commons-io:2.11.0'

    testImplementation 'org.junit.jupiter:junit-jupiter-engine:5.9.3'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.3.1'
}

// Include non-Java files (images, properties) from src/main/java on the classpath
sourceSets {
    main {
        resources {
            srcDirs 'src/main/java', 'src/main/resources'
            exclude '**/*.java'
        }
    }
}

processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes 'Main-Class': 'sudoku.Main'
    }
}

shadowJar {
    archiveBaseName = 'hodoku'
    archiveVersion = '1.0'
    archiveClassifier = ''
    manifest {
        attributes 'Main-Class': 'sudoku.Main'
    }
}

tasks.register('run', JavaExec) {
    dependsOn shadowJar
    classpath = files(shadowJar.archiveFile)
    mainClass = 'sudoku.Main'
    jvmArgs '--add-opens', 'java.desktop/com.apple.laf=ALL-UNNAMED'
}
